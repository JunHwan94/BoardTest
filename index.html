<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N3 Master (Offline Ready)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 15px; }
        .main-text { font-size: 3rem; margin: 0; font-weight: bold; }
        .sub-text { font-size: 1.3rem; color: var(--accent); margin-top: 10px; min-height: 1.5rem; visibility: hidden; }
        .sub-text.show { visibility: visible; }
        .grammar-detail { text-align: left; font-size: 1rem; line-height: 1.6; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-check { background: #eee; }
        .btn-next { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vocab')">단어 퀴즈</button>
        <button class="tab-btn" onclick="switchTab('grammar')">문법/지문</button>
    </div>

    <!-- 단어 섹션 -->
    <div id="vocab-section">
        <div class="card">
            <p id="v-kanji" class="main-text">준비</p>
            <p id="v-info" class="sub-text">じゅんび | 준비</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-check" onclick="showAnswer('v-info')">정답 확인</button>
            <button class="btn btn-next" onclick="nextVocab()">다음 단어</button>
        </div>
    </div>

    <!-- 문법 섹션 -->
    <div id="grammar-section" style="display:none;">
        <div class="card">
            <div id="g-content" class="grammar-detail">
                <strong id="g-title" style="font-size: 1.2rem; color: var(--accent);">~たばかり</strong><br>
                <p id="g-meaning" style="margin: 5px 0; color: #666;">막 ~했을 뿐</p>
                <hr>
                <p id="g-ex">さっき昼ごはんを食べたばかりです。</p>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-next" style="width: 100%;" onclick="nextGrammar()">다른 문법 보기</button>
        </div>
    </div>
</div>

<script>
    // N3 단어 데이터 (예시 데이터 - 용량을 위해 일부만 수록, 여기에 더 추가 가능)
    const n3Vocab = [
        {k: "解決", r: "かいけつ", m: "해결"}, {k: "確認", r: "かくにん", m: "확인"},
        {k: "経済", r: "けいざい", m: "경제"}, {k: "複雑", r: "ふくざつ", m: "복잡"},
        {k: "法律", r: "ほうりつ", m: "법률"}, {k: "興味", r: "きょうみ", m: "흥미"},
        {k: "技術", r: "ぎじゅつ", m: "기술"}, {k: "広告", r: "こうこく", m: "광고"}
    ];

    // N3 문법 데이터
    const n3Grammar = [
        {t: "~おかげで", m: "~덕분에", e: "先生のおかげで合格しました。"},
        {t: "~うちに", m: "~하는 동안에", e: "若いうちに勉強しておきなさい。"},
        {t: "~はずだ", m: "~할 터이다", e: "彼は今日来るはずです。"},
        {t: "~たとたん", m: "~하자마자", e: "家を出たとたん、雨が降り出した。"}
    ];

    function switchTab(type) {
        document.getElementById('vocab-section').style.display = type === 'vocab' ? 'block' : 'none';
        document.getElementById('grammar-section').style.display = type === 'grammar' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(type === 'vocab' ? '단어' : '문법'));
        });
    }

    function nextVocab() {
        const item = n3Vocab[Math.floor(Math.random() * n3Vocab.length)];
        document.getElementById('v-kanji').innerText = item.k;
        document.getElementById('v-info').innerText = `${item.r} | ${item.m}`;
        document.getElementById('v-info').classList.remove('show');
    }

    function nextGrammar() {
        const item = n3Grammar[Math.floor(Math.random() * n3Grammar.length)];
        document.getElementById('g-title').innerText = item.t;
        document.getElementById('g-meaning').innerText = item.m;
        document.getElementById('g-ex').innerText = item.e;
    }

    function showAnswer(id) {
        document.getElementById(id).classList.add('show');
    }

    // 초기 실행
    nextVocab();
    nextGrammar();
</script>

</body>
</html>
